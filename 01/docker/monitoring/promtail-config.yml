server:
  http_listen_port: 9080
  grpc_listen_port: 0

clients:
  # This tells Promtail to send the logs to the Loki container
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_swarm_logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Grab the container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      # Grab the Swarm service name (e.g., myapp_booking) so I can search by service!
      - source_labels: ['__meta_docker_container_label_com_docker_swarm_service_name']
        target_label: 'swarm_service'
